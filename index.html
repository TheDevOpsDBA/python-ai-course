
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python for AI - Interactive Course</title>

<link rel="stylesheet" href="css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css"/>

</head>
<body>

<header>
<a href="https://www.powershellacademy.com/s/store" target="_blank" class="logo-link">
<img src="images/Powershell Academy Logo 300-300.png" alt="PowerShell Academy" class="header-logo">
</a>
<h1>Python for AI - Interactive Course</h1>
</header>

<div class="toolbar">
<select id="moduleSelect"></select>
<select id="sectionSelect"></select>

<button onclick="previousSection()">⬅ Back</button>
<button onclick="nextSection()">Next ➡</button>
</div>

<div class="layout">

<div class="left-panel">

<h3 class="section-heading" id="sectionHeading"></h3>

<div class="diagram-box">
<svg viewBox="0 0 600 220" width="100%" height="220">
<rect x="40" y="50" width="140" height="70" rx="12" fill="#533483"/>
<text x="70" y="92" fill="white" font-size="22">Python</text>

<rect x="230" y="50" width="140" height="70" rx="12" fill="#e94560"/>
<text x="245" y="92" fill="white" font-size="22">Automation</text>

<rect x="420" y="50" width="140" height="70" rx="12" fill="#7fdbca"/>
<text x="475" y="92" fill="black" font-size="22">AI</text>

<line x1="180" y1="85" x2="230" y2="85" stroke="white" stroke-width="5"/>
<line x1="370" y1="85" x2="420" y2="85" stroke="white" stroke-width="5"/>
</svg>
</div>

<button class="expand-btn" onclick="toggleDescription()">⛶ Expand / Restore</button>

<div class="reveal-controls">
<button class="reveal-btn" onclick="revealAll()">⏩ Show All</button>
<span id="revealCount" class="reveal-counter"></span>
</div>

<div id="description"></div>

<div id="syntax"></div>

</div>

<div class="right-panel">

<div id="exampleTabs"></div>

<textarea id="editor"></textarea>

<div class="action-row">
<button onclick="runCode()">▶ Run All</button>
<button onclick="runSelected()">▶ Run Selected</button>
<button onclick="clearOutput()">🧹 Clear Output</button>
</div>

<pre id="output"></pre>

<div class="chat-panel">
<div class="chat-header">
<span>🤖 Ask AI about this code</span>
<button class="chat-toggle" onclick="toggleChat()">▼</button>
</div>
<div id="chatBody" class="chat-body">
<div id="chatMessages" class="chat-messages">
<div class="chat-msg bot">Hi! I can explain the code in the editor. Ask me anything about it.</div>
</div>
<div class="chat-input-row">
<input type="text" id="chatInput" placeholder="e.g. What does line 3 do?" onkeydown="if(event.key==='Enter')sendChat()">
<button onclick="sendChat()">Send</button>
</div>
</div>
</div>

</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/python/python.min.js"></script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js"></script>

<script src="data/courses.js"></script>
<script src="js/diagrams.js"></script>
<script src="js/app.js"></script>

</body>
</html>
